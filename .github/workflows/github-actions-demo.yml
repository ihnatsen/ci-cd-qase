name: Qase Pytest Automation
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      qase_run_id:
        description: 'ID запуска из Qase'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем корректный пакет, который есть в PyPI
        pip install pytest qase-pytest

    - name: 🚀 Run Pytest
      env:
        # Эти имена переменных (QASE_) соответствуют библиотеке qase-pytest
        QASE_API_TOKEN: ${{ secrets.QASE_TOKEN }}
        QASE_PROJECT: "LP"
        # Подставляем ID из кнопки Qase
        QASE_RUN_ID: ${{ github.event.inputs.qase_run_id }}
      run: |
        # Запуск с флагом отчета
        pytest --qase-mode=report