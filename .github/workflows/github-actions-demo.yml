name: Qase Pytest Automation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      qase_run_id:
        description: 'ID запуска из Qase'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Используем актуальный плагин
        pip install pytest pytest-qase

    - name: 🚀 Run Pytest
      env:
        # 1. Токен (берется из Settings -> Secrets вашего репозитория)
        QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TOKEN }}

        # 2. Код проекта (LP)
        QASE_TESTOPS_PROJECT: "LP"

        # 3. ID запуска (передается автоматически при нажатии кнопки в Qase)
        QASE_TESTOPS_RUN_ID: ${{ github.event.inputs.qase_run_id }}
      run: |
        # Запускаем тесты. Плагин сам подтянет данные из env выше.
        pytest --qase-mode=report