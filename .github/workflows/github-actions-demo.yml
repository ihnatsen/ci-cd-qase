name: Qase Pytest Automation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      qase_run_id:
        description: 'ID запуска из Qase'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ИСПРАВЛЕНО: Ставим актуальный плагин
        pip install pytest pytest-qase 

    - name: 🚀 Run Pytest
      env:
        # ИСПРАВЛЕНО: Эти имена переменных работают ТОЛЬКО с pytest-qase
        QASE_MODE: report
        QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TOKEN }}
        QASE_TESTOPS_PROJECT: "LP"
        QASE_TESTOPS_RUN_ID: ${{ github.event.inputs.qase_run_id }}
      run: |
        # Теперь просто запускаем pytest без флагов, так как всё в env
        pytest